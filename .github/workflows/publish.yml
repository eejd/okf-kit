name: Publish image

# ghcr publish for the okf-hive-dev deploy path (agent-services-hive#222).
# Multi-arch: the production deploy target is an arm64 Colima VM; amd64 kept
# for CI/runner parity. Consumers pin by digest (ADR-0007 §2) — the manifest
# digest printed in the build-push step output is the value to pin.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/eejd/okf-kit:latest
            ghcr.io/eejd/okf-kit:${{ github.sha }}
